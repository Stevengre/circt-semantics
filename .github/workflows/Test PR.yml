name: 'Test PR'
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches:
      - 'main'

# 并发控制 （同时只存在一个工作流，且最新的会覆盖旧的）

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kproj-code-quality-checks:
    name: 'kproj: Code Quality'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: ./src
    steps:
      - name: 'Check out code'
        uses: actions/checkout@v4
      - name: 'Set up environment'
        uses: ./.github/actions/setup-kproj-env
        with:
          python-version: ${{ matrix.python-version }}
      - name: 'Run code quality checks'
        run: make check
      - name: 'Run pyupgrade'
        run: make pyupgrade


  code-quality:
    name: 'Code Quality Checks'
    runs-on: ubuntu-latest
    needs:
      - kproj-code-quality-checks
    steps:
      - run: true
